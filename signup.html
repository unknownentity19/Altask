<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/base.css" />
<link rel="stylesheet" href="assets/css/pages.css" />
<link rel="canonical" href="https://altask.app/signup.html" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://altask.app/signup.html" />
<meta property="og:title" content="Sign Up · Altask" />
<meta property="og:description" content="Create your Altask account and start building." />
<meta property="og:site_name" content="Altask" />
<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="Sign Up · Altask" />
<meta name="twitter:description" content="Create your Altask account and start building." />
<link rel="manifest" href="/site.webmanifest" />
<link rel="dns-prefetch" href="https://fonts.googleapis.com" />
<style>
  .auth-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .auth-card {
    width: 100%;
    max-width: 420px;
    padding: 40px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 4px 12px rgba(15, 15, 20, 0.08);
  }
  .auth-card h1 {
    font-size: 28px;
    margin-bottom: 12px;
    text-align: center;
  }
  .auth-card p {
    text-align: center;
    margin-bottom: 32px;
    font-size: 14px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--fg);
  }
  .form-group input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    transition: border-color 0.2s;
  }
  .form-group input:focus {
    outline: none;
    border-color: var(--p-500);
    box-shadow: 0 0 0 3px rgba(59, 98, 196, 0.1);
  }
  .btn-submit {
    width: 100%;
    padding: 12px 14px;
    background: var(--p-600);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-submit:hover {
    background: var(--p-700);
  }
  .auth-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 14px;
  }
  .auth-footer a {
    color: var(--p-600);
    text-decoration: none;
    font-weight: 600;
  }
  .auth-footer a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>
  <header class="site-nav" style="border-bottom: 1px solid var(--border);"><div class="container site-nav__inner">
    <a class="site-nav__brand" href="index.html"><span class="brand-mark"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 18l6-12 4 8 2-4 4 8" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span> Altask</a>
  </div></header>

  <main id="main">
    <div class="auth-container">
      <div class="auth-card">
        <h1>Sign Up</h1>
        <p>Create your account and start building</p>
        
        <form>
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
          </div>
          
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create a password" required>
          </div>

          <div class="form-group">
            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" name="confirm" placeholder="Confirm password" required>
          </div>

          <button type="submit" class="btn-submit">Create Account</button>
        </form>

        <div class="auth-footer">
          <p style="margin: 0 0 12px;">Already have an account? <a href="signin.html">Sign In</a></p>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/js/site.js"></script>
</body>
</html>
