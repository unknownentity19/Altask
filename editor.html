<!doctype html>
<html lang="en">
<head>
<!-- @prod-pass v2 -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Editor · Altask</title>
  <meta name="description" content="The Altask visual editor — drag components, edit them inline, and export your page as a real HTML file." />
  <meta name="theme-color" content="#06080d" />
  <link rel="icon" href="assets/images/tab.jpg" type="image/jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Urbanist:wght@400;500;600;700;800&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/base.css?v=8" />
  <link rel="stylesheet" href="assets/css/pages.css?v=17" />
  <link rel="stylesheet" href="assets/css/editor.css?v=10" />
<link rel="canonical" href="https://altask.dev/editor.html" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://altask.dev/editor.html" />
<meta property="og:title" content="Editor · Altask" />
<meta property="og:description" content="The Altask visual website builder. Drag, drop, and ship in your browser." />
<meta property="og:image" content="https://altask.dev/assets/og-image.svg" />
<meta property="og:site_name" content="Altask" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Editor · Altask" />
<meta name="twitter:description" content="The Altask visual website builder. Drag, drop, and ship in your browser." />
<meta name="twitter:image" content="https://altask.dev/assets/og-image.svg" />
<link rel="manifest" href="/site.webmanifest" />
<link rel="dns-prefetch" href="https://fonts.googleapis.com" />
</head>
<body class="editor-page">
  <a href="#main" class="skip-link">Skip to content</a>
  <div class="ed-app">

    <!-- ============== Left icon rail ============== -->
    <nav class="ed-rail" aria-label="Editor navigation">
      <a href="index.html" class="ed-rail__brand" title="Back to site">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" aria-hidden="true">
          <path d="M4 18l6-12 4 8 2-4 4 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <div class="ed-rail__group">
        <button class="ed-rail__btn is-active" data-rail="add" title="Add components">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button class="ed-rail__btn" data-rail="pages" title="Pages">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg>
        </button>
        <button class="ed-rail__btn" data-rail="media" title="Media library">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M21 17l-5-5-7 7"/></svg>
        </button>
        <button class="ed-rail__btn" data-rail="layers" title="Layers">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 13l9 5 9-5M3 18l9 5 9-5"/></svg>
        </button>
        <button class="ed-rail__btn" data-rail="settings" title="Settings">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.36.18.59.55.6.94v.06a2 2 0 1 1 0 4z"/></svg>
        </button>
      </div>
      <div class="ed-rail__bottom">
        <button class="ed-rail__btn" data-rail="search" title="Search">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        </button>
        <button class="ed-rail__btn" data-rail="help" title="Help">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 2.5-3 4M12 17h.01"/></svg>
        </button>
      </div>
    </nav>

    <!-- ============== Top bar ============== -->
    <header class="ed-top">
      <div class="ed-top__left">
        <input id="nameInput" class="ed-top__name" type="text" value="Untitled site" />
        <span class="ed-top__url" id="siteUrl">https://altask.dev</span>
      </div>

      <div class="ed-top__center">
        <div class="ed-segment" role="group" aria-label="Device preview">
          <button class="ed-segment__btn is-on" data-device="desktop" title="Desktop">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8M12 16v4"/></svg>
          </button>
          <button class="ed-segment__btn" data-device="tablet" title="Tablet">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="2"/><circle cx="12" cy="18" r=".8"/></svg>
          </button>
          <button class="ed-segment__btn" data-device="mobile" title="Mobile">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="2" width="10" height="20" rx="2"/><circle cx="12" cy="18" r=".8"/></svg>
          </button>
        </div>

        <div class="ed-zoom" role="group" aria-label="Canvas zoom">
          <span class="ed-zoom__width" id="zoomWidth">1440 PX</span>
          <span class="ed-zoom__sep">/</span>
          <button class="ed-zoom__btn" id="zoomOutBtn" title="Zoom out" aria-label="Zoom out">−</button>
          <span class="ed-zoom__pct" id="zoomPct">60 %</span>
          <button class="ed-zoom__btn" id="zoomInBtn" title="Zoom in" aria-label="Zoom in">+</button>
        </div>
      </div>

      <div class="ed-top__right">
        <button id="undoBtn" class="ed-iconbtn" title="Undo (⌘Z)">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-3"/></svg>
        </button>
        <button id="redoBtn" class="ed-iconbtn" title="Redo (⌘⇧Z)">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14l5-5-5-5"/><path d="M20 9H9a5 5 0 0 0 0 10h3"/></svg>
        </button>
        <span class="ed-divider"></span>
        <button id="resetBtn" class="ed-iconbtn" title="Reset to a blank canvas">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
        </button>
        <button id="historyBtn" class="ed-iconbtn" title="History">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        </button>
        <button id="previewBtn" class="ed-iconbtn" title="Preview">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <button id="exportBtn" class="ed-publish" title="Export HTML">Publish</button>
        <span class="ed-avatar" title="Account">JT</span>
      </div>
    </header>

    <!-- ============== Components panel ============== -->
    <aside class="ed-panel" aria-label="Components">
      <div class="ed-tabs" role="tablist">
        <button class="ed-tab is-active" data-tab="layouts" role="tab" aria-selected="true">Layouts</button>
        <button class="ed-tab" data-tab="elements" role="tab" aria-selected="false">Elements</button>
      </div>

      <div class="ed-search">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="paletteSearch" type="search" placeholder="Search" autocomplete="off" />
      </div>

      <div id="paletteList" class="ed-comp-list" role="tabpanel"></div>
    </aside>

    <!-- ============== Canvas ============== -->
    <div id="canvasWrap" class="ed-canvas-wrap">
      <div id="canvasFrame" class="ed-canvas-frame">
        <div id="canvasScale" class="ed-canvas-scale">
          <div id="canvas" class="ed-canvas" data-device="desktop"></div>
        </div>
      </div>
    </div>

    <!-- ============== Inspector ============== -->
    <aside class="ed-insp-wrap" aria-label="Properties">
      <div class="ed-insp-tabs" role="tablist">
        <button class="ed-insp-tab is-active" data-insptab="design" title="Design">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21h16M5 17l4-12 4 8 2-4 4 8"/></svg>
        </button>
        <button class="ed-insp-tab" data-insptab="layout" title="Layout">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        </button>
        <button class="ed-insp-tab" data-insptab="effects" title="Effects">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h14v18l-7-4-7 4z"/></svg>
        </button>
        <button class="ed-insp-tab" data-insptab="content" title="Content">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h12M4 18h16"/></svg>
        </button>
        <button class="ed-insp-tab" data-insptab="data" title="Data">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21V10M9 21V4M15 21v-9M21 21V8"/></svg>
        </button>
      </div>
      <div id="inspector" class="ed-insp"></div>
    </aside>

  </div>

  <!-- Preview overlay -->
  <div id="preview" class="ed-preview" role="dialog" aria-label="Preview">
    <div class="ed-preview__top">
      <strong>Live Preview</strong>
      <button id="closePreviewBtn" class="ed-iconbtn-secondary">Close</button>
    </div>
    <iframe id="previewFrame" title="Preview"></iframe>
  </div>

  <!-- Toast -->
  <div id="toast" class="ed-toast" role="status" aria-live="polite"></div>

  <script src="assets/js/editor.js?v=10"></script>
</body>
</html>
